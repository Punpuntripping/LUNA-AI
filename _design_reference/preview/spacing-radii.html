<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8"/>
<title>Luna — Spacing / Radii</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin:0; padding:18px; background:var(--background); font-family:var(--font-sans); color:var(--foreground); display:flex; gap:18px; align-items:center; }
  .cell { display:flex; flex-direction:column; align-items:center; gap:6px; }
  .box  { width:64px; height:64px; background:var(--luna-primary); }
  .l    { font-size:11px; font-weight:500; }
  .v    { font-family:var(--font-mono); font-size:10px; color:var(--muted-foreground); direction:ltr; }
</style>
</head>
<body>
  <div class="cell"><div class="box" style="border-radius:var(--radius-sm)"></div><div class="l">sm</div><div class="v">4px</div></div>
  <div class="cell"><div class="box" style="border-radius:var(--radius-md)"></div><div class="l">md</div><div class="v">6px</div></div>
  <div class="cell"><div class="box" style="border-radius:var(--radius-lg)"></div><div class="l">lg · base</div><div class="v">8px · buttons, cards</div></div>
  <div class="cell"><div class="box" style="border-radius:var(--radius-xl)"></div><div class="l">xl</div><div class="v">12px · chat input</div></div>
  <div class="cell"><div class="box" style="border-radius:var(--radius-2xl)"></div><div class="l">2xl</div><div class="v">16px · bubbles</div></div>
  <div class="cell"><div class="box" style="border-radius:var(--radius-full)"></div><div class="l">full</div><div class="v">pills, avatars</div></div>
</body>
</html>
