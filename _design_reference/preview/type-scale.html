<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8"/>
<title>Luna — Typography / Scale</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin:0; padding:18px; background:var(--background); font-family:var(--font-sans); color:var(--foreground); }
  .row { display:flex; align-items:baseline; gap:14px; margin-bottom:8px; }
  .meta { font-family:var(--font-mono); font-size:10px; color:var(--muted-foreground); min-width:110px; direction:ltr; }
</style>
</head>
<body>
  <div class="row"><div class="meta">30 / 700 / -0.02em</div><div style="font-size:30px;font-weight:700;letter-spacing:-0.02em;line-height:1.2">مرحباً بك في لونا</div></div>
  <div class="row"><div class="meta">24 / 600</div><div style="font-size:24px;font-weight:600;line-height:1.35">المساعد القانوني الذكي</div></div>
  <div class="row"><div class="meta">18 / 600</div><div style="font-size:18px;font-weight:600">تعديل القضية</div></div>
  <div class="row"><div class="meta">14 / 500</div><div style="font-size:14px;font-weight:500">عقد إيجار تجاري</div></div>
  <div class="row"><div class="meta">14 / 400</div><div style="font-size:14px;line-height:1.7">اكتب رسالتك هنا... (اكتب @ لعرض الأوامر)</div></div>
  <div class="row"><div class="meta">12 / 400 muted</div><div style="font-size:12px;color:var(--muted-foreground)">منذ 3 دقائق — نظام العمل السعودي</div></div>
  <div class="row"><div class="meta">10 / 500 pill</div><div style="font-size:10px;font-weight:500;padding:2px 8px;border-radius:9999px;background:var(--case-realestate-bg);color:var(--case-realestate-fg);display:inline-block">عقاري</div></div>
</body>
</html>
