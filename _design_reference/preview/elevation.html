<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8"/>
<title>Luna — Elevation</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin:0; padding:22px; background:var(--muted); font-family:var(--font-sans); color:var(--foreground); display:flex; gap:18px; align-items:center; }
  .c { background:var(--card); border:1px solid var(--border); border-radius:var(--radius-lg); padding:14px 16px; font-size:12px; min-width:140px; }
  .v { font-family:var(--font-mono); font-size:10px; color:var(--muted-foreground); display:block; margin-top:4px; direction:ltr; }
  .s1 { box-shadow:var(--shadow-sm); }
  .s2 { box-shadow:var(--shadow-md); }
  .s3 { box-shadow:var(--shadow-lg); }
  .fr { border-color:transparent; box-shadow:var(--shadow-focus-ring); }
</style>
</head>
<body>
  <div class="c">flat<span class="v">border only</span></div>
  <div class="c s1">shadow-sm<span class="v">cards, bubbles</span></div>
  <div class="c s2">shadow-md<span class="v">hover lift</span></div>
  <div class="c s3">shadow-lg<span class="v">popovers, menus</span></div>
  <div class="c fr">focus ring<span class="v">2px primary + offset</span></div>
</body>
</html>
