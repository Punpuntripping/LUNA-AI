<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8"/>
<title>Luna — Typography / Family</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin:0; padding:18px; background:var(--background); font-family:var(--font-sans); color:var(--foreground); }
  .name { font-size:14px; font-weight:600; }
  .sub { font-size:11px; color:var(--muted-foreground); font-family:var(--font-mono); direction:ltr; margin-bottom:14px; }
  .row { display:flex; gap:16px; align-items:baseline; margin-bottom:4px; }
  .w { font-family:var(--font-mono); font-size:10px; color:var(--muted-foreground); min-width:36px; direction:ltr; }
  .s { font-size:20px; }
  .ltn { font-size:14px; color:var(--muted-foreground); direction:ltr; }
</style>
</head>
<body>
  <div class="name">IBM Plex Sans Arabic</div>
  <div class="sub">next/font/google · Arabic + Latin · 300 / 400 / 500 / 600 / 700</div>
  <div class="row"><div class="w">300</div><div class="s" style="font-weight:300">العدالة في خدمة المحامي</div><div class="ltn">Light</div></div>
  <div class="row"><div class="w">400</div><div class="s" style="font-weight:400">العدالة في خدمة المحامي</div><div class="ltn">Regular — body</div></div>
  <div class="row"><div class="w">500</div><div class="s" style="font-weight:500">العدالة في خدمة المحامي</div><div class="ltn">Medium — labels</div></div>
  <div class="row"><div class="w">600</div><div class="s" style="font-weight:600">العدالة في خدمة المحامي</div><div class="ltn">Semibold — titles</div></div>
  <div class="row"><div class="w">700</div><div class="s" style="font-weight:700">العدالة في خدمة المحامي</div><div class="ltn">Bold — logo / H1</div></div>
</body>
</html>
