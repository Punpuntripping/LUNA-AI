<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8"/>
<title>Luna — Brand / Logo</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin:0; padding:18px; background:var(--background); font-family:var(--font-sans); color:var(--foreground); display:flex; align-items:center; gap:22px; }
  .mark-xs, .mark-sm, .mark-lg { background:var(--luna-primary); color:var(--luna-primary-foreground); font-weight:700; display:flex; align-items:center; justify-content:center; }
  .mark-xs { width:32px; height:32px; border-radius:8px; font-size:11px; }
  .mark-sm { width:56px; height:56px; border-radius:12px; font-size:18px; }
  .mark-lg { width:96px; height:96px; border-radius:18px; font-size:32px; }
  .lockup { display:flex; align-items:center; gap:10px; }
  .wm { display:flex; flex-direction:column; }
  .wm .n { font-weight:600; font-size:18px; }
  .wm .t { font-size:12px; color:var(--muted-foreground); }
</style>
</head>
<body>
  <div class="mark-lg">لونا</div>
  <div class="mark-sm">لونا</div>
  <div class="mark-xs">لونا</div>
  <div class="lockup">
    <div class="mark-sm">لونا</div>
    <div class="wm"><span class="n">لونا القانونية</span><span class="t">المساعد القانوني الذكي</span></div>
  </div>
</body>
</html>
