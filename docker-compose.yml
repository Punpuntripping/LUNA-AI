# Luna Legal AI — Local Development Services
# Usage: docker-compose up -d
#
# This runs Redis locally for development.
# Supabase is hosted (cloud) — no local container needed.

services:
  redis:
    image: redis:7-alpine
    container_name: luna-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  redis_data:
    driver: local
